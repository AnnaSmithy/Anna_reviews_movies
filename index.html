<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anna Reviews Movies</title>
  <meta name="description" content="A clean, minimal archive of over 100 film reviews dating back to 2021." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="site-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Anna Reviews Movies</p>
        <h1>A polished little film-review archive.</h1>
        <p class="lede">
          Thoughtful, critic-style reviews of modern cinema — over 100 entries, organized by date, year, genre, and rating.
        </p>
        <div class="hero-stats">
          <div><span id="stat-count">103</span><small>reviews</small></div>
          <div><span>2021</span><small>first year</small></div>
          <div><span id="stat-latest">2025</span><small>latest year</small></div>
        </div>
      </div>
      <div class="hero-card">
        <p class="card-label">Featured review</p>
        <h2 id="featured-title">Loading…</h2>
        <p id="featured-meta" class="meta"></p>
        <p id="featured-excerpt"></p>
        <button id="featured-button" class="ghost-button">Read full review</button>
      </div>
    </header>

    <main>
      <section class="controls">
        <div class="search-wrap">
          <label for="search">Search</label>
          <input id="search" type="search" placeholder="Search by title or genre" />
        </div>
        <div class="filter-wrap">
          <label for="yearFilter">Year</label>
          <select id="yearFilter">
            <option value="all">All years</option>
          </select>
        </div>
        <div class="filter-wrap">
          <label for="genreFilter">Genre</label>
          <select id="genreFilter">
            <option value="all">All genres</option>
          </select>
        </div>
        <div class="filter-wrap">
          <label for="sortBy">Sort</label>
          <select id="sortBy">
            <option value="newest">Newest reviews</option>
            <option value="oldest">Oldest reviews</option>
            <option value="rating">Highest rated</option>
            <option value="title">Title A–Z</option>
          </select>
        </div>
      </section>

      <section class="results-head">
        <p id="resultsText">Showing all reviews</p>
      </section>

      <section id="reviewsGrid" class="reviews-grid"></section>
    </main>
  </div>

  <div id="modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <article class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <button class="modal-close" id="modalClose" aria-label="Close review">×</button>
      <p id="modalKicker" class="eyebrow small"></p>
      <h2 id="modalTitle"></h2>
      <p id="modalMeta" class="meta"></p>
      <div id="modalBody" class="modal-body"></div>
    </article>
  </div>

  <script src="reviews.js"></script>
  <script src="script.js"></script>
</body>
</html>
