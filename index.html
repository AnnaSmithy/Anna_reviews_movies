<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Late Screening</title>
  <meta name="description" content="A minimal, mobile-friendly archive of movie reviews by fictional film critic Mara Voss." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="site-brand" href="#/">
        <span class="site-brand__title">The Late Screening</span>
        <span class="site-brand__tag">Film criticism by Mara Voss</span>
      </a>
      <nav class="site-nav" aria-label="Primary">
        <a href="#/">Home</a>
        <a href="#/archive">Archive</a>
