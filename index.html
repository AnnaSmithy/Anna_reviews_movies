<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anna Reviews Movies</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 60px auto;
      padding: 0 20px;
      background: #ffffff;
      color: #111111;
      line-height: 1.6;
    }
    h1 {
      font-size: 2rem;
      margin-bottom: 0.2em;
    }
    .review {
      margin: 30px 0;
      padding-bottom: 20px;
      border-bottom: 1px solid #ddd;
    }
    .movie-title {
      font-size: 1.2rem;
      font-weight: bold;
    }
    .rating {
      color: #555;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>Anna Reviews Movies</h1>
  <p>Simple reviews of movies I watch.</p>

  <div class="review">
    <div class="movie-title">Past Lives</div>
    <div class="rating">Rating: 8/10</div>
    <p>Quiet, emotional, and very well acted. It stays with you after it ends.</p>
  </div>

  <div class="review">
    <div class="movie-title">Dune: Part Two</div>
    <div class="rating">Rating: 9/10</div>
    <p>Beautiful visuals, strong pacing, and much more intense than I expected.</p>
  </div>
</body>
</html>
